global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:
  # host.docker.internal reaches the dev services running on the Mac host
  - job_name: "fluent-api"
    static_configs:
      - targets: ["host.docker.internal:3001"]
    metrics_path: /metrics

  - job_name: "fluent-sandbox"
    static_configs:
      - targets: ["host.docker.internal:3002"]
    metrics_path: /metrics
