{{/*
templates/NOTES.txt
*/}}
{{ .Chart.Name }} {{ .Chart.AppVersion }} has been deployed successfully.

  Release:   {{ .Release.Name }}
  Namespace: {{ .Release.Namespace }}
  Version:   {{ .Chart.AppVersion }}

{{- if eq .Values.service.type "LoadBalancer" }}

Wait for your external IP to be assigned:
  kubectl get svc --namespace {{ .Release.Namespace }} {{ .Release.Name }}-webapp -w

{{- else }}

Access the application via port-forward:
  kubectl port-forward --namespace {{ .Release.Namespace }} svc/{{ .Release.Name }}-webapp 8080:{{ .Values.service.port }}
  echo "Visit http://127.0.0.1:8080"

{{- end }}

---
# values.schema.json
{
  "$schema": "http://json-schema.org/draft-07/schema#",
  "type": "object",
  "required": ["image"],
  "properties": {
    "replicaCount": {
      "type": "integer",
      "minimum": 1
    },
    "image": {
      "type": "object",
      "required": ["repository"],
      "properties": {
        "repository": {
          "type": "string"
        },
        "tag": {
          "type": "string"
        },
        "pullPolicy": {
          "type": "string",
          "enum": ["Always", "IfNotPresent", "Never"]
        }
      }
    },
    "service": {
      "type": "object",
      "properties": {
        "type": {
          "type": "string",
          "enum": ["ClusterIP", "NodePort", "LoadBalancer"]
        },
        "port": {
          "type": "integer",
          "minimum": 1,
          "maximum": 65535
        }
      }
    }
  }
}
