apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-db-credentials" .Release.Name | trunc 63 | trimSuffix "-" }}
  namespace: {{ .Release.Namespace }}
  labels:
    environment: {{ .Values.global.env | default "production" | lower }}
type: Opaque
data:
  DB_HOST: {{ required "db.host is required" .Values.db.host | b64enc }}
  DB_PASSWORD: {{ required "db.password is required" .Values.db.password | b64enc }}
  DB_NAME: {{ .Values.db.name | default "appdb" | b64enc | quote }}
