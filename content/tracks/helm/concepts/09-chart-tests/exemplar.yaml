apiVersion: v1
kind: Pod
metadata:
  name: {{ .Release.Name }}-test-connection
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:latest
      command:
        - curl
        - --fail
        - --silent
        - --max-time
        - "5"
        - http://{{ include "webapp.fullname" . }}:{{ .Values.service.port }}/health

---
apiVersion: v1
kind: Pod
metadata:
  name: {{ .Release.Name }}-test-db
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation
    "helm.sh/hook-weight": "1"
spec:
  restartPolicy: Never
  containers:
    - name: psql
      image: postgres:15-alpine
      command:
        - psql
        - -h
        - {{ .Release.Name }}-postgresql
        - -U
        - {{ .Values.postgresql.auth.username }}
        - -c
        - SELECT 1
      env:
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Release.Name }}-postgresql
              key: password
